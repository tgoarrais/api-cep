server:
  port: 8080

spring:
  application:
    name: cep-api

  datasource:
    url: jdbc:postgresql://localhost:5432/cep_db
    username: cep_user
    password: cep_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

cep:
  client:
    base-url: http://localhost:8089